<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="cartcrft">
  <!-- Solid hexagon tile (sibling of webcrft) -->
  <path d="M24 4 L41.32 14 L41.32 34 L24 44 L6.68 34 L6.68 14 Z" fill="#B5FF2E"/>
  <!-- Minimal geometric cart in ink -->
  <g fill="none" stroke="#0C0D0A" stroke-width="2.9" stroke-linecap="round" stroke-linejoin="round">
    <!-- handle + basket -->
    <path d="M13 15 H17 L20 30 H32.5 L36 19 H18"/>
  </g>
  <!-- wheels (ink nodes) -->
  <circle cx="21" cy="35.5" r="2.4" fill="#0C0D0A"/>
  <circle cx="31" cy="35.5" r="2.4" fill="#0C0D0A"/>
  <!-- agent node accent (ink) -->
  <circle cx="36.6" cy="18.4" r="2.7" fill="#0C0D0A"/>
</svg>
