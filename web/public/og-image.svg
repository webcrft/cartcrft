<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a1060"/>
    </linearGradient>
    <linearGradient id="cc-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="glow-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="radial-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-g)"/>
  <!-- Subtle radial glow -->
  <ellipse cx="600" cy="315" rx="600" ry="350" fill="url(#radial-glow)"/>

  <!-- Grid dots pattern (decorative) -->
  <g opacity="0.12" fill="#6366f1">
    <circle cx="80" cy="80" r="1.5"/><circle cx="160" cy="80" r="1.5"/><circle cx="240" cy="80" r="1.5"/>
    <circle cx="80" cy="160" r="1.5"/><circle cx="160" cy="160" r="1.5"/><circle cx="240" cy="160" r="1.5"/>
    <circle cx="80" cy="240" r="1.5"/><circle cx="160" cy="240" r="1.5"/><circle cx="240" cy="240" r="1.5"/>
    <circle cx="960" cy="390" r="1.5"/><circle cx="1040" cy="390" r="1.5"/><circle cx="1120" cy="390" r="1.5"/>
    <circle cx="960" cy="470" r="1.5"/><circle cx="1040" cy="470" r="1.5"/><circle cx="1120" cy="470" r="1.5"/>
    <circle cx="960" cy="550" r="1.5"/><circle cx="1040" cy="550" r="1.5"/><circle cx="1120" cy="550" r="1.5"/>
  </g>

  <!-- Logo mark (cart + agent graph) at top-left -->
  <g transform="translate(80, 60) scale(0.6)">
    <path d="M8 18 H24 L37.5 81 a9 9 0 0 0 8.8 7 h47.4 a9 9 0 0 0 8.8 -7 L114 34 H30"
          fill="none" stroke="url(#cc-g)" stroke-width="9"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="48" cy="110" r="7.5" fill="#6366f1"/>
    <circle cx="94" cy="110" r="7.5" fill="#14b8a6"/>
    <path d="M52 64 L72 50 L92 64" fill="none" stroke="url(#cc-g)"
          stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <circle cx="52" cy="64" r="5.5" fill="#6366f1"/>
    <circle cx="72" cy="50" r="6.5" fill="url(#cc-g)"/>
    <circle cx="92" cy="64" r="5.5" fill="#14b8a6"/>
  </g>

  <!-- Wordmark -->
  <text x="161" y="127" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" letter-spacing="-1">
    <tspan fill="#f8fafc">cart</tspan><tspan fill="url(#cc-g)">crft</tspan>
  </text>

  <!-- Main headline -->
  <text x="80" y="270" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="68" font-weight="800" letter-spacing="-2" fill="#f8fafc">
    Agent-native
  </text>
  <text x="80" y="350" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="68" font-weight="800" letter-spacing="-2" fill="url(#cc-g)">
    commerce backend.
  </text>

  <!-- Subheadline -->
  <text x="80" y="420" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="400" fill="#94a3b8" letter-spacing="-0.5">
    MCP server · ACP/UCP · Signed mandates · MIT licensed · Zero rake
  </text>

  <!-- Decorative: abstract agent graph on right side -->
  <g transform="translate(820, 200)" opacity="0.85">
    <!-- Agent node: intent -->
    <circle cx="80" cy="100" r="28" fill="none" stroke="#6366f1" stroke-width="2"/>
    <circle cx="80" cy="100" r="18" fill="#6366f1" fill-opacity="0.15"/>
    <text x="80" y="96" text-anchor="middle" font-family="monospace" font-size="9" fill="#818cf8">AGENT</text>
    <text x="80" y="107" text-anchor="middle" font-family="monospace" font-size="9" fill="#818cf8">INTENT</text>

    <!-- Arrow right -->
    <path d="M108 100 L162 100" stroke="url(#cc-g)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="162,96 170,100 162,104" fill="#8b8cf0"/>

    <!-- MCP node -->
    <circle cx="200" cy="100" r="28" fill="none" stroke="url(#cc-g)" stroke-width="2"/>
    <circle cx="200" cy="100" r="18" fill="url(#cc-g)" fill-opacity="0.12"/>
    <text x="200" y="96" text-anchor="middle" font-family="monospace" font-size="9" fill="#a5b4fc">MCP</text>
    <text x="200" y="107" text-anchor="middle" font-family="monospace" font-size="9" fill="#a5b4fc">SERVER</text>

    <!-- Arrow right -->
    <path d="M228 100 L282 100" stroke="url(#cc-g)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="282,96 290,100 282,104" fill="#14b8a6"/>

    <!-- Cart node -->
    <circle cx="320" cy="100" r="28" fill="none" stroke="#14b8a6" stroke-width="2"/>
    <circle cx="320" cy="100" r="18" fill="#14b8a6" fill-opacity="0.12"/>
    <text x="320" y="96" text-anchor="middle" font-family="monospace" font-size="9" fill="#5eead4">CART</text>
    <text x="320" y="107" text-anchor="middle" font-family="monospace" font-size="9" fill="#5eead4">CHECKOUT</text>

    <!-- Down arrow from cart -->
    <path d="M320 128 L320 182" stroke="url(#cc-g)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="316,182 320,190 324,182" fill="#14b8a6"/>

    <!-- Payment node -->
    <circle cx="320" cy="220" r="28" fill="none" stroke="#14b8a6" stroke-width="2"/>
    <circle cx="320" cy="220" r="18" fill="#14b8a6" fill-opacity="0.08"/>
    <text x="320" y="216" text-anchor="middle" font-family="monospace" font-size="9" fill="#5eead4">MANDATE</text>
    <text x="320" y="227" text-anchor="middle" font-family="monospace" font-size="9" fill="#5eead4">ed25519</text>

    <!-- Signed badge line -->
    <path d="M80 128 Q80 200 292 220" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,4" opacity="0.5"/>

    <!-- Labels -->
    <text x="80" y="148" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Claude / LLM</text>
    <text x="200" y="148" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">cartcrft.io</text>
    <text x="320" y="148" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">your store</text>
  </g>

  <!-- Bottom tagline -->
  <text x="80" y="570" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="18" fill="#475569">
    cartcrft.dev
  </text>

  <!-- Pill badges bottom right -->
  <g transform="translate(500, 540)">
    <rect x="0" y="0" width="110" height="28" rx="14" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="1"/>
    <text x="55" y="18" text-anchor="middle" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="600" fill="#818cf8">MIT licensed</text>
    <rect x="120" y="0" width="100" height="28" rx="14" fill="#14b8a6" fill-opacity="0.15" stroke="#14b8a6" stroke-width="1"/>
    <text x="170" y="18" text-anchor="middle" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="600" fill="#2dd4bf">0% rake</text>
    <rect x="230" y="0" width="130" height="28" rx="14" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-width="1" stroke-opacity="0.6"/>
    <text x="295" y="18" text-anchor="middle" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="600" fill="#a5b4fc">MCP · ACP · UCP</text>
  </g>
</svg>
