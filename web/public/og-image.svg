<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Dark warm-ink background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0d0a"/>
      <stop offset="60%" stop-color="#111209"/>
      <stop offset="100%" stop-color="#161510"/>
    </linearGradient>
    <!-- Electric-lime accent gradient -->
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8f135"/>
      <stop offset="100%" stop-color="#9fe219"/>
    </linearGradient>
    <!-- Warm ink text gradient -->
    <linearGradient id="inktext" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8e0cc"/>
    </linearGradient>
    <!-- Lime glow radial -->
    <radialGradient id="limeglow" cx="22%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#c8f135" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0c0d0a" stop-opacity="0"/>
    </radialGradient>
    <!-- Right-side warm glow -->
    <radialGradient id="warmglow" cx="85%" cy="45%" r="30%">
      <stop offset="0%" stop-color="#d4a84b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0c0d0a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Ambient glows -->
  <rect width="1200" height="630" fill="url(#limeglow)"/>
  <rect width="1200" height="630" fill="url(#warmglow)"/>

  <!-- Subtle grain texture via fine dots (warm ink feel) -->
  <g opacity="0.04" fill="#f5f0e8">
    <circle cx="100" cy="100" r="1"/><circle cx="200" cy="140" r="1"/><circle cx="320" cy="80" r="1"/>
    <circle cx="450" cy="120" r="1"/><circle cx="580" cy="90" r="1"/><circle cx="700" cy="130" r="1"/>
    <circle cx="150" cy="200" r="1"/><circle cx="270" cy="240" r="1"/><circle cx="390" cy="190" r="1"/>
    <circle cx="1050" cy="480" r="1"/><circle cx="1100" cy="520" r="1"/><circle cx="1150" cy="490" r="1"/>
    <circle cx="1000" cy="560" r="1"/><circle cx="1080" cy="570" r="1"/>
  </g>

  <!-- Electric-lime left accent bar -->
  <rect x="64" y="64" width="4" height="502" rx="2" fill="url(#lime)" opacity="0.9"/>

  <!-- ── Hexagon-cart logo mark ── -->
  <g transform="translate(96, 80)">
    <!-- Hexagon outline (warm ink) -->
    <polygon points="52,0 104,30 104,90 52,120 0,90 0,30"
             fill="none" stroke="#c8f135" stroke-width="2.5" opacity="0.9"/>
    <!-- Inner hex fill subtle -->
    <polygon points="52,8 96,32 96,88 52,112 8,88 8,32"
             fill="#c8f135" fill-opacity="0.05"/>
    <!-- Cart shape inside hex -->
    <path d="M20 45 H34 L43 78 a5 5 0 0 0 4.8 4 h26 a5 5 0 0 0 4.8-4 L87 51 H30"
          fill="none" stroke="#c8f135" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="48" cy="88" r="4.5" fill="#c8f135"/>
    <circle cx="76" cy="88" r="4.5" fill="#c8f135"/>
    <!-- Agent graph nodes above cart (electric lime) -->
    <path d="M34 62 L52 52 L70 62"
          fill="none" stroke="#c8f135" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <circle cx="34" cy="62" r="3.5" fill="#9fe219"/>
    <circle cx="52" cy="52" r="4.5" fill="#c8f135"/>
    <circle cx="70" cy="62" r="3.5" fill="#9fe219"/>
  </g>

  <!-- Wordmark "cartcrft" -->
  <text x="222" y="148"
        font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Code', 'Fira Mono', monospace"
        font-size="32" font-weight="700" letter-spacing="2" fill="url(#inktext)" opacity="0.9">
    cartcrft
  </text>

  <!-- Thin separator line (lime) -->
  <line x1="96" y1="218" x2="720" y2="218" stroke="#c8f135" stroke-width="1" opacity="0.25"/>

  <!-- Main headline — large, warm ink -->
  <text x="96" y="304"
        font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="74" font-weight="800" letter-spacing="-2.5" fill="url(#inktext)">
    Agent-native
  </text>
  <text x="96" y="388"
        font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="74" font-weight="800" letter-spacing="-2.5" fill="url(#lime)">
    commerce backend.
  </text>

  <!-- Subheadline -->
  <text x="96" y="450"
        font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Code', monospace"
        font-size="20" font-weight="400" fill="#7a7568" letter-spacing="0.5">
    MCP server · ACP/UCP · Signed mandates · MIT · 0% rake
  </text>

  <!-- Thin separator line (lime) -->
  <line x1="96" y1="480" x2="720" y2="480" stroke="#c8f135" stroke-width="1" opacity="0.25"/>

  <!-- Bottom tagline + domain -->
  <text x="96" y="560"
        font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="18" fill="#4a4840">
    open-source · self-host or cloud · https://cartcrft.dev
  </text>

  <!-- ── Right-side agent flow diagram ── -->
  <g transform="translate(790, 140)" opacity="0.9">
    <!-- Connecting lines (dashed lime) -->
    <!-- Agent → MCP -->
    <line x1="100" y1="60" x2="230" y2="60" stroke="#c8f135" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
    <polygon points="228,56 238,60 228,64" fill="#c8f135" opacity="0.7"/>
    <!-- MCP → Store (down) -->
    <line x1="270" y1="88" x2="270" y2="168" stroke="#c8f135" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
    <polygon points="266,166 270,176 274,166" fill="#9fe219" opacity="0.7"/>
    <!-- Agent loop back (soft warm arc) -->
    <path d="M60 88 Q60 190 238 220" stroke="#d4a84b" stroke-width="1" stroke-dasharray="3,5" fill="none" opacity="0.35"/>

    <!-- Node: AGENT -->
    <circle cx="60" cy="60" r="38" fill="#0c0d0a" stroke="#c8f135" stroke-width="1.5"/>
    <circle cx="60" cy="60" r="30" fill="#c8f135" fill-opacity="0.05"/>
    <text x="60" y="55" text-anchor="middle"
          font-family="ui-monospace, monospace" font-size="9" fill="#c8f135" font-weight="700">AGENT</text>
    <text x="60" y="67" text-anchor="middle"
          font-family="ui-monospace, monospace" font-size="9" fill="#9fe219">INTENT</text>

    <!-- Node: MCP -->
    <circle cx="270" cy="60" r="38" fill="#0c0d0a" stroke="#c8f135" stroke-width="1.5"/>
    <circle cx="270" cy="60" r="30" fill="#c8f135" fill-opacity="0.07"/>
    <text x="270" y="55" text-anchor="middle"
          font-family="ui-monospace, monospace" font-size="10" fill="#c8f135" font-weight="700">MCP</text>
    <text x="270" y="67" text-anchor="middle"
          font-family="ui-monospace, monospace" font-size="9" fill="#9fe219">SERVER</text>

    <!-- Node: STORE -->
    <circle cx="270" cy="210" r="38" fill="#0c0d0a" stroke="#9fe219" stroke-width="1.5"/>
    <circle cx="270" cy="210" r="30" fill="#c8f135" fill-opacity="0.05"/>
    <text x="270" y="205" text-anchor="middle"
          font-family="ui-monospace, monospace" font-size="9" fill="#c8f135" font-weight="700">CART &amp;</text>
    <text x="270" y="217" text-anchor="middle"
          font-family="ui-monospace, monospace" font-size="9" fill="#9fe219">CHECKOUT</text>

    <!-- Node: MANDATE (payment, ed25519 signed) -->
    <circle cx="60" cy="210" r="38" fill="#0c0d0a" stroke="#d4a84b" stroke-width="1.5"/>
    <circle cx="60" cy="210" r="30" fill="#d4a84b" fill-opacity="0.06"/>
    <text x="60" y="205" text-anchor="middle"
          font-family="ui-monospace, monospace" font-size="8" fill="#d4a84b" font-weight="700">MANDATE</text>
    <text x="60" y="218" text-anchor="middle"
          font-family="ui-monospace, monospace" font-size="8" fill="#c8a43e">ed25519</text>

    <!-- Labels under nodes -->
    <text x="60" y="108" text-anchor="middle"
          font-family="ui-monospace, monospace" font-size="8" fill="#3a3830">Claude / LLM</text>
    <text x="270" y="108" text-anchor="middle"
          font-family="ui-monospace, monospace" font-size="8" fill="#3a3830">cartcrft.dev</text>
    <text x="270" y="258" text-anchor="middle"
          font-family="ui-monospace, monospace" font-size="8" fill="#3a3830">your store</text>
    <text x="60" y="258" text-anchor="middle"
          font-family="ui-monospace, monospace" font-size="8" fill="#3a3830">payment</text>
  </g>

  <!-- Pill badges bottom-right -->
  <g transform="translate(830, 530)">
    <rect x="0" y="0" width="100" height="26" rx="13" fill="#0c0d0a" stroke="#c8f135" stroke-width="1"/>
    <text x="50" y="17" text-anchor="middle"
          font-family="ui-sans-serif, sans-serif" font-size="10" font-weight="700" fill="#c8f135">MIT licensed</text>
    <rect x="112" y="0" width="80" height="26" rx="13" fill="#0c0d0a" stroke="#9fe219" stroke-width="1"/>
    <text x="152" y="17" text-anchor="middle"
          font-family="ui-sans-serif, sans-serif" font-size="10" font-weight="700" fill="#9fe219">0% rake</text>
    <rect x="204" y="0" width="130" height="26" rx="13" fill="#0c0d0a" stroke="#d4a84b" stroke-width="1"/>
    <text x="269" y="17" text-anchor="middle"
          font-family="ui-sans-serif, sans-serif" font-size="10" font-weight="700" fill="#d4a84b">MCP · ACP · UCP</text>
  </g>
</svg>
